name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-xwin
        run: cargo install cargo-xwin

      - name: Install LLVM (for llvm-rc resource compiler)
        run: sudo apt-get install -y llvm

      - name: Build
        working-directory: clipimg-app
        run: cargo xwin build --target x86_64-pc-windows-msvc --release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: clipimg-app/target/x86_64-pc-windows-msvc/release/clipimg.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
